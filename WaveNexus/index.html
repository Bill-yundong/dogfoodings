<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaveNexus</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        min-height: 100vh;
        color: white;
      }
      #debug-panel {
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.8);
        padding: 10px;
        border-radius: 8px;
        font-size: 12px;
        font-family: monospace;
        z-index: 9999;
        max-width: 300px;
        max-height: 400px;
        overflow-y: auto;
      }
      .debug-log {
        margin: 2px 0;
        padding: 2px 4px;
        border-radius: 2px;
      }
      .debug-log.log { background: rgba(14, 165, 233, 0.2); }
      .debug-log.error { background: rgba(239, 68, 68, 0.3); color: #fca5a5; }
      .debug-log.warn { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
    </style>
  </head>
  <body>
    <div id="debug-panel">
      <div class="debug-log log">🌊 HTML Loaded</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
